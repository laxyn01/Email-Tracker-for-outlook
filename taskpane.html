<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <title>Email Tracker</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f7ff; padding: 16px; font-size: 13px; }

    .logo { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .logo span:first-child { font-size: 20px; }
    .logo span:last-child  { font-size: 15px; font-weight: 700; color: #5046e4; }

    #box {
      border-radius: 10px; padding: 12px 14px; margin-bottom: 12px;
      line-height: 1.55; background: #fff; border: 1.5px solid #dde1ff;
      color: #444; min-height: 52px;
    }
    #box.green  { background: #f0fdf4; border-color: #4ade80; color: #14532d; }
    #box.red    { background: #fff1f2; border-color: #f87171; color: #7f1d1d; }
    #box.amber  { background: #fffbeb; border-color: #fbbf24; color: #78350f; }
    .bt  { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
    .bd  { font-size: 12px; opacity: .85; white-space: pre-line; }
    .obadge { display: inline-block; background: #4ade80; color: #14532d;
              border-radius: 20px; padding: 1px 9px; font-weight: 700; font-size: 12px; margin-left: 4px; }

    button {
      width: 100%; padding: 11px; border: none; border-radius: 9px;
      font-size: 13px; font-weight: 700; cursor: pointer; margin-bottom: 8px;
    }
    button:active  { opacity: .8; }
    button:disabled { opacity: .4; cursor: default; }
    #btnTrack  { background: linear-gradient(135deg,#667eea,#764ba2); color: #fff; }
    #btnRemove { background: #fee2e2; color: #991b1b; }
    #btnCheck  { background: #f3f4f6; color: #555; }

    hr { border: none; border-top: 1px solid #e8eaff; margin: 8px 0 10px; }
    .foot { text-align: center; }
    .foot a { color: #667eea; font-size: 12px; text-decoration: none; }
    .foot a:hover { text-decoration: underline; }

    .spin { display:inline-block; width:12px; height:12px; border:2px solid rgba(255,255,255,.3);
            border-top-color:#fff; border-radius:50%; animation:sp .6s linear infinite;
            vertical-align:middle; margin-right:5px; }
    @keyframes sp { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

<div class="logo"><span>📧</span><span>Email Tracker</span></div>

<div id="box"><div class="bt">Initializing…</div></div>

<button id="btnTrack"  onclick="addTracking()"   disabled>🔍 Track This Email</button>
<button id="btnRemove" onclick="removeTracking()" disabled>✖ Remove Tracking</button>

<hr>

<button id="btnCheck"  onclick="checkStatus()"   disabled>🔄 Check Open Status</button>

<div class="foot" style="margin-top:10px">
  <a href="https://email-tracker-outlook.onrender.com/dashboard" target="_blank">📊 Open Dashboard →</a>
</div>

<script>
var SERVER = 'https://email-tracker-outlook.onrender.com';
var MA = '<!--ET-S-->';
var MB = '<!--ET-E-->';

var trackId  = null;
var pollTimer = null;

function ui(title, cls, detail) {
  var b = document.getElementById('box');
  b.className = cls || '';
  b.innerHTML = '<div class="bt">' + (title||'') + '</div>' + (detail ? '<div class="bd">' + esc(detail) + '</div>' : '');
}
function uiHtml(titleHtml, cls, detailHtml) {
  var b = document.getElementById('box');
  b.className = cls || '';
  b.innerHTML = '<div class="bt">' + titleHtml + '</div>' + (detailHtml ? '<div class="bd">' + detailHtml + '</div>' : '');
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
(function() {
  if (Office.onReady) {
    Office.onReady(function() { ready(); });
  } else {
    Office.initialize = function() { ready(); };
  }
})();

function ready() {
  ui('Ready. Click "Track This Email" before sending.', '');
  document.getElementById('btnTrack').disabled  = false;
  document.getElementById('btnRemove').disabled = false;
  document.getElementById('btnCheck').disabled  = false;
}

function genId() {
  return 'et' + Date.now().toString(36) + Math.random().toString(36).substr(2,4);
}

// Pixel HTML. Rules:
//  - elementToProof wrapper: Outlook won't strip it during send
//  - NO display:none: clients skip loading hidden images
//  - Both attribute and style width/height=1
//  - .gif extension on URL: some clients only proxy known image types
//  - Comment markers: for precise removal later
function buildPixel(id) {
  return MA +
    '<div class="elementToProof" style="overflow:hidden;height:1px;max-height:1px;line-height:0;font-size:0">' +
    '<img src="' + SERVER + '/pixel/' + id + '.gif"' +
    ' width="1" height="1" style="width:1px;height:1px;border:0;outline:0;margin:0;padding:0"' +
    ' alt=""/>' +
    '</div>' +
    MB;
}

function addTracking() {
  if (trackId) { ui('Already tracking. Remove first to reset.', 'amber'); return; }

  uiHtml('<span class="spin"></span> Reading email…', '');
  document.getElementById('btnTrack').disabled = true;

  var item = Office.context.mailbox.item;
  var newId = genId();

  item.subject.getAsync(function(sr) {
    var subj = (sr.status === Office.AsyncResultStatus.Succeeded && sr.value) ? sr.value : '(No Subject)';
    item.to.getAsync(function(tr) {
      var to = 'Unknown';
      if (tr.status === Office.AsyncResultStatus.Succeeded && tr.value && tr.value.length) {
        to = tr.value.map(function(r){ return r.emailAddress; }).join(', ');
      }

      // Register — server records our IP so it can exclude it from pixel hits
      fetch(SERVER + '/register?id=' + encodeURIComponent(newId)
            + '&subject=' + encodeURIComponent(subj)
            + '&to=' + encodeURIComponent(to))
        .catch(function(){})
        .then(function() {
          injectPixel(item, newId, subj, to);
        });
    });
  });
}

function injectPixel(item, id, subj, to) {
  var pixel = buildPixel(id);
  item.body.getAsync(Office.CoercionType.Html, function(br) {
    if (br.status !== Office.AsyncResultStatus.Succeeded) {
      ui('Failed to read email body.', 'red', br.error ? br.error.message : '');
      document.getElementById('btnTrack').disabled = false;
      return;
    }

    var body = br.value || '';
    var newBody;

    // Insert just before </body> — safest position across all clients
    if (/<\/body>/i.test(body)) {
      newBody = body.replace(/<\/body>/i, pixel + '</body>');
    } else {
      newBody = body + pixel;
    }

    item.body.setAsync(newBody, { coercionType: Office.CoercionType.Html }, function(wr) {
      if (wr.status !== Office.AsyncResultStatus.Succeeded) {
        ui('Failed to insert pixel.', 'red', wr.error ? wr.error.message : '');
        document.getElementById('btnTrack').disabled = false;
        return;
      }
      trackId = id;
      uiHtml('✅ Tracking ON', 'green', esc('To: ' + to + '\nSubject: ' + subj));
      startPoll(id);
    });
  });
}

function removeTracking() {
  if (!trackId) { ui('Nothing to remove.', ''); return; }
  stopPoll();
  var item = Office.context.mailbox.item;
  item.body.getAsync(Office.CoercionType.Html, function(r) {
    if (r.status !== Office.AsyncResultStatus.Succeeded) { ui('Failed to read body.', 'red'); return; }
    var body = r.value || '';
    var a = body.indexOf(MA), b = body.indexOf(MB);
    if (a === -1 || b === -1) { ui('Pixel not found (already sent?).', 'amber'); trackId = null; return; }
    var clean = body.substring(0, a) + body.substring(b + MB.length);
    item.body.setAsync(clean, { coercionType: Office.CoercionType.Html }, function(wr) {
      if (wr.status === Office.AsyncResultStatus.Succeeded) {
        trackId = null;
        ui('Tracking removed.', '');
        document.getElementById('btnTrack').disabled = false;
      } else {
        ui('Removal failed.', 'red', wr.error ? wr.error.message : '');
      }
    });
  });
}

function checkStatus() {
  if (!trackId) { ui('No active tracking. Track an email first.', 'amber'); return; }
  fetchStatus(trackId);
}

function fetchStatus(id) {
  fetch(SERVER + '/status/' + encodeURIComponent(id))
    .then(function(r){ return r.json(); })
    .then(function(d) {
      if (!d.found) { ui('Email not found on server.', 'amber', 'Server may have restarted.'); return; }
      if (d.openCount > 0) {
        var last = d.opens[d.opens.length-1];
        uiHtml(
          '✅ Opened <span class="obadge">' + d.openCount + '×</span>',
          'green',
          esc('Last: ' + last.time + ' · ' + last.device + ' · ' + last.client)
        );
      } else {
        ui('❌ Not opened yet', 'amber', 'To: ' + (d.to||''));
      }
    })
    .catch(function() { ui('Server unreachable.', 'red'); });
}

function startPoll(id) {
  stopPoll();
  pollTimer = setInterval(function() {
    if (trackId === id) fetchStatus(id); else stopPoll();
  }, 30000);
}
function stopPoll() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}
</script>
</body>
</html>
