<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <title>Email Tracker</title>
  <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; padding: 14px; background: #f8f9ff; }
    h2 { color: #667eea; font-size: 16px; margin-bottom: 12px; }
    #status {
      background: #fff; border: 1px solid #dde0ff;
      border-radius: 8px; padding: 11px;
      font-size: 13px; color: #444;
      margin-bottom: 12px; min-height: 44px; line-height: 1.5;
    }
    .green { background: #f0fdf4 !important; border-color: #22c55e !important; color: #166534 !important; }
    .red   { background: #fef2f2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
    button {
      width: 100%; padding: 11px; border: none;
      border-radius: 8px; font-size: 14px;
      font-weight: 600; cursor: pointer; margin-bottom: 8px;
    }
    #btnTrack  { background: linear-gradient(135deg,#667eea,#764ba2); color: #fff; }
    #btnRemove { background: #efefef; color: #555; }
    #dash { text-align: center; margin-top: 10px; font-size: 12px; }
    #dash a { color: #667eea; }
  </style>
</head>
<body>
  <h2>📧 Email Tracker</h2>
  <div id="status">Initializing...</div>
  <button id="btnTrack"  onclick="addTracking()">🔍 Track This Email</button>
  <button id="btnRemove" onclick="removeTracking()">✖ Remove Tracking</button>
  <div id="dash">
    <a href="https://email-tracker-outlook.onrender.com/dashboard" target="_blank">📊 Open Dashboard</a>
  </div>

<script>
var SERVER = 'https://email-tracker-outlook.onrender.com';
var tId = null;

function setStatus(msg, cls) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls || '';
}

if (Office.onReady) {
  Office.onReady(function() {
    setStatus('Ready! Track dabao before sending.', '');
  });
} else {
  Office.initialize = function() {
    setStatus('Ready! Track dabao before sending.', '');
  };
}

function genId() {
  return 'trk' + Date.now() + Math.random().toString(36).substr(2,5);
}

function addTracking() {
  try {
    var item = Office.context.mailbox.item;
    tId = genId();

    item.subject.getAsync(function(subjResult) {
      var subj = (subjResult.status === Office.AsyncResultStatus.Succeeded && subjResult.value)
        ? subjResult.value : 'No Subject';

      item.to.getAsync(function(toResult) {
        var to = 'Unknown';
        if (toResult.status === Office.AsyncResultStatus.Succeeded && toResult.value.length > 0) {
          to = toResult.value.map(function(x){ return x.emailAddress; }).join(', ');
        }

        // Register with server
        fetch(SERVER + '/register?id=' + tId +
          '&subject=' + encodeURIComponent(subj) +
          '&to=' + encodeURIComponent(to)).catch(function(){});

        // ✅ FIX: Pixel UPAR — email clip hone se pehle load hoga
        var pixel = '<img src="' + SERVER + '/pixel/' + tId +
          '" width="1" height="1" style="display:none" alt=""/>';

        item.body.getAsync(Office.CoercionType.Html, function(br) {
          if (br.status !== Office.AsyncResultStatus.Succeeded) {
            setStatus('Error: ' + br.error.message, 'red'); return;
          }
          // Pixel pehle, phir body content
          item.body.setAsync(pixel + br.value, { coercionType: Office.CoercionType.Html }, function(sr) {
            if (sr.status === Office.AsyncResultStatus.Succeeded) {
              setStatus('✅ Tracking ON!\nTo: ' + to + '\nSubject: ' + subj, 'green');
            } else {
              setStatus('Error: ' + sr.error.message, 'red');
            }
          });
        });
      });
    });

  } catch(e) {
    setStatus('Error: ' + e.message, 'red');
  }
}

function removeTracking() {
  if (!tId) { setStatus('Koi tracking nahi hai.', ''); return; }
  var item = Office.context.mailbox.item;
  item.body.getAsync(Office.CoercionType.Html, function(r) {
    if (r.status !== Office.AsyncResultStatus.Succeeded) return;
    var clean = r.value.replace(/<img[^>]*onrender\.com\/pixel\/[^>]*>/gi, '');
    item.body.setAsync(clean, { coercionType: Office.CoercionType.Html }, function() {
      tId = null;
      setStatus('Tracking hata diya.', '');
    });
  });
}
</script>
</body>
</html>
