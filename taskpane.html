<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <title>Email Tracker</title>
  <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; padding: 14px; background: #f8f9ff; }
    h2 { color: #667eea; font-size: 16px; margin-bottom: 12px; }
    #status {
      background: #fff; border: 1px solid #dde0ff;
      border-radius: 8px; padding: 11px;
      font-size: 13px; color: #444;
      margin-bottom: 12px; min-height: 44px; line-height: 1.5;
      white-space: pre-line;
    }
    .green { background: #f0fdf4 !important; border-color: #22c55e !important; color: #166534 !important; }
    .red   { background: #fef2f2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
    button {
      width: 100%; padding: 11px; border: none;
      border-radius: 8px; font-size: 14px;
      font-weight: 600; cursor: pointer; margin-bottom: 8px;
    }
    #btnTrack  { background: linear-gradient(135deg,#667eea,#764ba2); color: #fff; }
    #btnRemove { background: #efefef; color: #555; }
    #dash { text-align: center; margin-top: 10px; font-size: 12px; }
    #dash a { color: #667eea; }
  </style>
</head>
<body>
  <h2>📧 Email Tracker</h2>
  <div id="status">Initializing...</div>
  <button id="btnTrack"  onclick="addTracking()">🔍 Track This Email</button>
  <button id="btnRemove" onclick="removeTracking()">✖ Remove Tracking</button>
  <div id="dash">
    <a href="https://email-tracker-outlook.onrender.com/dashboard" target="_blank">📊 Open Dashboard</a>
  </div>

<script>
var SERVER = 'https://email-tracker-outlook.onrender.com';
var tId = null;

// ─── UNIQUE MARKER so we can find & remove our pixel reliably ───────────────
var MARKER_START = '<!--ETRK_START-->';
var MARKER_END   = '<!--ETRK_END-->';

function setStatus(msg, cls) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls || '';
}

if (Office.onReady) {
  Office.onReady(function() {
    setStatus('Ready! Click "Track This Email" before sending.', '');
  });
} else {
  Office.initialize = function() {
    setStatus('Ready! Click "Track This Email" before sending.', '');
  };
}

function genId() {
  return 'trk' + Date.now() + Math.random().toString(36).substr(2, 6);
}

function buildPixelHtml(id) {
  // ── FIX 1: NO display:none — hidden pixels are blocked by Gmail/Apple Mail.
  // ── FIX 2: width/height 1px in attributes AND style — belt + suspenders.
  // ── FIX 3: elementToProof wrapper — Outlook doesn't strip this during send.
  // ── FIX 4: Unique HTML comment markers for reliable find/remove.
  return MARKER_START +
    '<div class="elementToProof" style="line-height:0;font-size:0;overflow:hidden;max-height:1px">' +
    '<img src="' + SERVER + '/pixel/' + id + '"' +
    ' width="1" height="1"' +
    ' style="width:1px;height:1px;border:0;margin:0;padding:0;opacity:0"' +
    ' alt=""' +
    '/>' +
    '</div>' +
    MARKER_END;
}

function addTracking() {
  try {
    // If already tracked in this session, warn user
    if (tId) {
      setStatus('Already tracked! Remove first if you want to reset.', 'red');
      return;
    }

    var item = Office.context.mailbox.item;
    var newId = genId();

    item.subject.getAsync(function(subjResult) {
      var subj = (subjResult.status === Office.AsyncResultStatus.Succeeded && subjResult.value)
        ? subjResult.value : 'No Subject';

      item.to.getAsync(function(toResult) {
        var to = 'Unknown';
        if (toResult.status === Office.AsyncResultStatus.Succeeded && toResult.value && toResult.value.length > 0) {
          to = toResult.value.map(function(x) { return x.emailAddress; }).join(', ');
        }

        // Register with server BEFORE injecting pixel
        fetch(SERVER + '/register?id=' + encodeURIComponent(newId) +
          '&subject=' + encodeURIComponent(subj) +
          '&to=' + encodeURIComponent(to))
          .catch(function() {});

        var pixel = buildPixelHtml(newId);

        item.body.getAsync(Office.CoercionType.Html, function(br) {
          if (br.status !== Office.AsyncResultStatus.Succeeded) {
            setStatus('Error reading body: ' + br.error.message, 'red');
            return;
          }

          var body = br.value;

          // ── FIX 5: Don't insert at <body> start — insert just before </body>
          // This avoids Gmail clipping AND Outlook preview issues.
          var newBody;
          if (body.toLowerCase().indexOf('</body>') !== -1) {
            newBody = body.replace(/<\/body>/i, pixel + '</body>');
          } else {
            newBody = body + pixel;
          }

          item.body.setAsync(newBody, { coercionType: Office.CoercionType.Html }, function(sr) {
            if (sr.status === Office.AsyncResultStatus.Succeeded) {
              tId = newId;
              setStatus('✅ Tracking ON!\nTo: ' + to + '\nID: ' + newId, 'green');
            } else {
              setStatus('Error injecting pixel: ' + sr.error.message, 'red');
            }
          });
        });
      });
    });

  } catch(e) {
    setStatus('Error: ' + e.message, 'red');
  }
}

function removeTracking() {
  if (!tId) {
    setStatus('No active tracking to remove.', '');
    return;
  }
  var item = Office.context.mailbox.item;
  item.body.getAsync(Office.CoercionType.Html, function(r) {
    if (r.status !== Office.AsyncResultStatus.Succeeded) {
      setStatus('Error reading body for removal.', 'red');
      return;
    }

    // ── FIX 6: Use comment markers for precise removal — doesn't touch other elementToProof divs
    var body = r.value;
    var startIdx = body.indexOf(MARKER_START);
    var endIdx   = body.indexOf(MARKER_END);

    if (startIdx === -1 || endIdx === -1) {
      setStatus('Pixel not found in body (may have already been removed).', '');
      tId = null;
      return;
    }

    var clean = body.substring(0, startIdx) + body.substring(endIdx + MARKER_END.length);

    item.body.setAsync(clean, { coercionType: Office.CoercionType.Html }, function(sr) {
      if (sr.status === Office.AsyncResultStatus.Succeeded) {
        tId = null;
        setStatus('Tracking removed.', '');
      } else {
        setStatus('Error removing pixel: ' + sr.error.message, 'red');
      }
    });
  });
}
</script>
</body>
</html>
