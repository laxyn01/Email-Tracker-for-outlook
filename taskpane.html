<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <title>Email Tracker</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2ff; padding: 16px; font-size: 13px; min-height: 100vh;
    }
    .logo {
      display: flex; align-items: center; gap: 9px;
      margin-bottom: 16px; padding-bottom: 14px;
      border-bottom: 1px solid #e0e3ff;
    }
    .logo-icon { font-size: 22px; }
    .logo-text { font-size: 15px; font-weight: 700; color: #4338ca; letter-spacing: -.3px; }
    .logo-ver  { font-size: 10px; color: #a5b4fc; font-weight: 500; margin-left: auto; }

    /* Auto-track toggle card */
    .auto-card {
      background: #fff; border: 1.5px solid #dde1ff; border-radius: 10px;
      padding: 12px 14px; margin-bottom: 13px;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      transition: background .2s, border-color .2s;
    }
    .auto-card.on  { background: #f0fdf4; border-color: #4ade80; }
    .auto-label { flex: 1; }
    .auto-title { font-weight: 700; font-size: 13px; color: #1a1a2e; }
    .auto-sub   { font-size: 11px; color: #9ca3af; margin-top: 2px; }
    .auto-card.on .auto-title { color: #14532d; }
    .auto-card.on .auto-sub   { color: #16a34a; }

    /* Toggle switch */
    .toggle-wrap { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
    .toggle-wrap input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-slider {
      position: absolute; inset: 0; background: #d1d5db;
      border-radius: 24px; cursor: pointer; transition: background .2s;
    }
    .toggle-slider:before {
      content: ''; position: absolute; width: 18px; height: 18px;
      border-radius: 50%; background: #fff; top: 3px; left: 3px;
      transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }
    .toggle-wrap input:checked + .toggle-slider { background: #4ade80; }
    .toggle-wrap input:checked + .toggle-slider:before { transform: translateX(20px); }

    #box {
      border-radius: 10px; padding: 13px 15px; margin-bottom: 13px;
      line-height: 1.6; background: #fff; border: 1.5px solid #dde1ff; color: #444;
      min-height: 54px; transition: background .2s, border-color .2s;
    }
    #box.green { background: #f0fdf4; border-color: #4ade80; color: #14532d; }
    #box.red   { background: #fff1f2; border-color: #f87171; color: #7f1d1d; }
    #box.amber { background: #fffbeb; border-color: #fbbf24; color: #78350f; }
    .bt { font-weight: 700; font-size: 13px; margin-bottom: 3px; }
    .bd { font-size: 11.5px; opacity: .85; white-space: pre-line; }
    .obadge {
      display: inline-block; background: #4ade80; color: #14532d;
      border-radius: 20px; padding: 1px 9px; font-weight: 700; font-size: 11px; margin-left: 4px;
    }
    .btn-group { display: flex; flex-direction: column; gap: 8px; }
    button {
      width: 100%; padding: 11px 14px; border: none; border-radius: 9px;
      font-size: 12.5px; font-weight: 700; cursor: pointer; transition: opacity .15s, transform .1s;
    }
    button:active  { opacity: .8; transform: scale(.98); }
    button:disabled { opacity: .35; cursor: default; }
    #btnTrack  { background: linear-gradient(135deg,#4f46e5,#7c3aed); color: #fff; }
    #btnRemove { background: #fee2e2; color: #991b1b; }
    .divider { border: none; border-top: 1px solid #e8eaff; margin: 10px 0; }
    #btnCheck  { background: #f3f4f6; color: #374151; }
    .foot { text-align: center; margin-top: 14px; }
    .foot a {
      color: #4f46e5; font-size: 11.5px; text-decoration: none;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .foot a:hover { text-decoration: underline; }
    .spin {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: sp .6s linear infinite; vertical-align: middle; margin-right: 5px;
    }
    @keyframes sp { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="logo">
  <span class="logo-icon">📧</span>
  <span class="logo-text">Email Tracker</span>
  <span class="logo-ver">v6</span>
</div>

<!-- Auto-track toggle -->
<div class="auto-card" id="autoCard">
  <div class="auto-label">
    <div class="auto-title">Auto-Track</div>
    <div class="auto-sub" id="autoSub">Off — track manually below</div>
  </div>
  <label class="toggle-wrap">
    <input type="checkbox" id="autoToggle" onchange="onAutoToggleChange()">
    <span class="toggle-slider"></span>
  </label>
</div>

<div id="box"><div class="bt">Initializing…</div></div>

<div class="btn-group">
  <button id="btnTrack"  onclick="addTracking(null)" disabled>🔍 Track This Email</button>
  <button id="btnRemove" onclick="removeTracking()"  disabled>✖ Remove Tracking</button>
</div>

<hr class="divider">

<button id="btnCheck" onclick="checkStatus()" disabled>🔄 Check Open Status</button>

<div class="foot">
  <a href="https://email-tracker-outlook.onrender.com/dashboard" target="_blank">📊 Open Dashboard →</a>
</div>

<script>
var SERVER       = 'https://email-tracker-outlook.onrender.com';
var MARKER_START = '<!--ETSTART-->';
var MARKER_END   = '<!--ETEND-->';

var trackId   = null;
var pollTimer = null;
var autoTrack = false;

// ── UI helpers ────────────────────────────────────────────────────────────────
function ui(title, cls, detail) {
  var b = document.getElementById('box');
  b.className = cls || '';
  b.innerHTML = '<div class="bt">' + (title||'') + '</div>' +
    (detail ? '<div class="bd">' + esc(detail) + '</div>' : '');
}
function uiHtml(titleHtml, cls, detailHtml) {
  var b = document.getElementById('box');
  b.className = cls || '';
  b.innerHTML = '<div class="bt">' + titleHtml + '</div>' +
    (detailHtml ? '<div class="bd">' + detailHtml + '</div>' : '');
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Auto-track toggle ─────────────────────────────────────────────────────────
function onAutoToggleChange() {
  autoTrack = document.getElementById('autoToggle').checked;
  // Save to sessionStorage so function-file.html can read it
  try { sessionStorage.setItem('et_auto', autoTrack ? '1' : '0'); } catch(e) {}
  var card = document.getElementById('autoCard');
  var sub  = document.getElementById('autoSub');
  if (autoTrack) {
    card.className = 'auto-card on';
    sub.textContent = 'On — every email tracked on send';
    ui('✅ Auto-Track ON', 'green', 'Every email you send will be tracked automatically.\nNo need to click "Track This Email".');
  } else {
    card.className = 'auto-card';
    sub.textContent = 'Off — track manually below';
    ui('Auto-Track OFF', '', 'Click "Track This Email" before sending to track manually.');
  }
}

// ── Office init ───────────────────────────────────────────────────────────────
(function () {
  if (Office.onReady) {
    Office.onReady(function () { ready(); });
  } else {
    Office.initialize = function () { ready(); };
  }
})();

function ready() {
  ui('Ready. Toggle Auto-Track ON, or click "Track This Email".', '');
  document.getElementById('btnTrack').disabled  = false;
  document.getElementById('btnRemove').disabled = false;
  document.getElementById('btnCheck').disabled  = false;
  // If auto-track was on in a previous session, restore toggle state
  try {
    if (sessionStorage.getItem('et_auto') === '1') {
      document.getElementById('autoToggle').checked = true;
      autoTrack = true;
      document.getElementById('autoCard').className = 'auto-card on';
      document.getElementById('autoSub').textContent = 'On — every email tracked on send';
      // Auto-inject pixel immediately since taskpane just opened on a compose
      addTracking(null);
    }
  } catch(e) {}
}

function genId() {
  return 'et' + Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

function buildPixel(id) {
  return MARKER_START +
    '<div class="elementToProof" style="overflow:hidden;height:1px;max-height:1px;line-height:0;font-size:0;mso-hide:none">' +
    '<img src="' + SERVER + '/pixel/' + id + '.gif"' +
    ' width="1" height="1" style="width:1px;height:1px;display:block;border:0;outline:0;margin:0;padding:0" alt=""/>' +
    '</div>' + MARKER_END;
}

// ── addTracking ───────────────────────────────────────────────────────────────
// callback = null  → manual button click
// callback = fn    → called by ItemSend event, fn(true) allows send
function addTracking(callback) {
  var isAuto = typeof callback === 'function';

  // Already tracked
  if (trackId) {
    if (!isAuto) { ui('Already tracking. Remove first to reset.', 'amber'); }
    else { callback(true); }
    return;
  }

  if (!isAuto) {
    uiHtml('<span class="spin"></span> Adding tracking…', '');
    document.getElementById('btnTrack').disabled = true;
  }

  var item  = Office.context.mailbox.item;
  var newId = genId();

  item.subject.getAsync(function (sr) {
    var subj = (sr.status === Office.AsyncResultStatus.Succeeded && sr.value) ? sr.value : '(No Subject)';
    getRecipientsWithRetry(item, 0, function(to) {
      fetch(SERVER + '/register?id=' + encodeURIComponent(newId) +
            '&subject=' + encodeURIComponent(subj) + '&to=' + encodeURIComponent(to))
        .then(function () { injectPixel(item, newId, subj, to, callback); })
        .catch(function () { injectPixel(item, newId, subj, to, callback); });
    });
  });
}

function getRecipientsWithRetry(item, attempt, callback) {
  item.to.getAsync(function (tr) {
    if (tr.status === Office.AsyncResultStatus.Succeeded && tr.value && tr.value.length > 0) {
      callback(tr.value.map(function(r){ return r.emailAddress; }).join(', '));
    } else if (attempt < 3) {
      setTimeout(function () { getRecipientsWithRetry(item, attempt + 1, callback); }, 800);
    } else {
      callback('Unknown');
    }
  });
}

function injectPixel(item, id, subj, to, callback) {
  var isAuto = typeof callback === 'function';
  item.body.getAsync(Office.CoercionType.Html, function (br) {
    if (br.status !== Office.AsyncResultStatus.Succeeded) {
      if (!isAuto) { ui('Failed to read body.', 'red'); document.getElementById('btnTrack').disabled = false; }
      else callback(true);
      return;
    }
    var body    = br.value || '';
    var pixel   = buildPixel(id);
    var newBody = /<\/body>/i.test(body) ? body.replace(/<\/body>/i, pixel + '</body>') : body + pixel;
    item.body.setAsync(newBody, { coercionType: Office.CoercionType.Html }, function (wr) {
      if (wr.status !== Office.AsyncResultStatus.Succeeded) {
        if (!isAuto) { ui('Failed to insert pixel.', 'red'); document.getElementById('btnTrack').disabled = false; }
        else callback(true);
        return;
      }
      trackId = id;
      uiHtml('✅ ' + (isAuto ? 'Auto-tracked' : 'Tracking ON'), 'green', esc('To: ' + to + '\nSubject: ' + subj));
      startPoll(id);
      if (isAuto) callback(true);
    });
  });
}

// ── Auto-track note ───────────────────────────────────────────────────────────
// Auto-track works by injecting the pixel as soon as toggle is turned ON.
// When autoTrack is ON and user opens a new compose, pixel is auto-injected
// via the watchCompose() loop below.

// ── removeTracking ────────────────────────────────────────────────────────────
function removeTracking() {
  if (!trackId) { ui('Nothing to remove.', ''); return; }
  stopPoll();
  var item = Office.context.mailbox.item;
  item.body.getAsync(Office.CoercionType.Html, function (r) {
    if (r.status !== Office.AsyncResultStatus.Succeeded) { ui('Failed to read body.', 'red'); return; }
    var body = r.value || '';
    var a = body.indexOf(MARKER_START), b = body.indexOf(MARKER_END);
    if (a === -1 || b === -1) { ui('Pixel not found. Already sent?', 'amber'); trackId = null; return; }
    var clean = body.substring(0, a) + body.substring(b + MARKER_END.length);
    item.body.setAsync(clean, { coercionType: Office.CoercionType.Html }, function (wr) {
      if (wr.status === Office.AsyncResultStatus.Succeeded) {
        trackId = null; ui('Tracking removed.', ''); document.getElementById('btnTrack').disabled = false;
      } else { ui('Removal failed.', 'red'); }
    });
  });
}

// ── checkStatus ───────────────────────────────────────────────────────────────
function checkStatus() {
  if (!trackId) { ui('No active tracking. Track an email first.', 'amber'); return; }
  fetchStatus(trackId);
}
function fetchStatus(id) {
  fetch(SERVER + '/status/' + encodeURIComponent(id))
    .then(function(r){ return r.json(); })
    .then(function(d) {
      if (!d.found) { ui('Not found on server.', 'amber', 'Server may have restarted.'); return; }
      if (d.openCount > 0) {
        var last = d.opens[d.opens.length-1];
        uiHtml('✅ Opened <span class="obadge">' + d.openCount + '×</span>', 'green',
          esc('Last: ' + last.time + '\nDevice: ' + last.device + ' · ' + last.client));
      } else {
        ui('❌ Not opened yet', 'amber', 'To: ' + esc(d.to||'') + '\n' +
          (d.ignored > 0 ? d.ignored + ' hits filtered' : 'Waiting for recipient…'));
      }
    })
    .catch(function(){ ui('Cannot reach server.', 'red'); });
}
function startPoll(id) {
  stopPoll();
  pollTimer = setInterval(function(){ if (trackId===id) fetchStatus(id); else stopPoll(); }, 30000);
}
function stopPoll() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } }
</script>
</body>
</html>
