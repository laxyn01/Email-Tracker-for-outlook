<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script>
    // This file runs silently in the background when ItemSend fires.
    // It duplicates the minimal tracking logic so it works even if
    // the taskpane is not open.

    var SERVER       = 'https://email-tracker-outlook.onrender.com';
    var MARKER_START = '<!--ETSTART-->';
    var MARKER_END   = '<!--ETEND-->';

    // Read auto-track preference from sessionStorage
    // (taskpane writes it when toggle is changed)
    function isAutoTrackOn() {
      try { return sessionStorage.getItem('et_auto') === '1'; } catch(e) { return false; }
    }

    (function () {
      if (Office.onReady) {
        Office.onReady(function () { registerHandler(); });
      } else {
        Office.initialize = function () { registerHandler(); };
      }
    })();

    function registerHandler() {
      // Register the ItemSend event handler
      Office.actions.associate('onItemSend', onItemSend);
    }

    function onItemSend(event) {
      if (!isAutoTrackOn()) {
        event.completed({ allowEvent: true });
        return;
      }

      var item  = Office.context.mailbox.item;
      var newId = 'et' + Date.now().toString(36) + Math.random().toString(36).substr(2, 5);

      item.subject.getAsync(function(sr) {
        var subj = (sr.status === Office.AsyncResultStatus.Succeeded && sr.value) ? sr.value : '(No Subject)';
        item.to.getAsync(function(tr) {
          var to = (tr.status === Office.AsyncResultStatus.Succeeded && tr.value && tr.value.length > 0)
            ? tr.value.map(function(r){ return r.emailAddress; }).join(', ')
            : 'Unknown';

          // Register on server
          fetch(SERVER + '/register?id=' + encodeURIComponent(newId) +
                '&subject=' + encodeURIComponent(subj) + '&to=' + encodeURIComponent(to))
            .catch(function(){}) // ignore register failure
            .then(function() { injectAndSend(item, newId, event); });
        });
      });
    }

    function buildPixel(id) {
      return MARKER_START +
        '<div class="elementToProof" style="overflow:hidden;height:1px;max-height:1px;line-height:0;font-size:0;mso-hide:none">' +
        '<img src="' + SERVER + '/pixel/' + id + '.gif"' +
        ' width="1" height="1" style="width:1px;height:1px;display:block;border:0;outline:0;margin:0;padding:0" alt=""/>' +
        '</div>' + MARKER_END;
    }

    function injectAndSend(item, id, event) {
      item.body.getAsync(Office.CoercionType.Html, function(br) {
        if (br.status !== Office.AsyncResultStatus.Succeeded) {
          event.completed({ allowEvent: true });
          return;
        }
        var body    = br.value || '';
        var pixel   = buildPixel(id);
        var newBody = /<\/body>/i.test(body) ? body.replace(/<\/body>/i, pixel + '</body>') : body + pixel;
        item.body.setAsync(newBody, { coercionType: Office.CoercionType.Html }, function() {
          // Always allow send regardless of inject result
          event.completed({ allowEvent: true });
        });
      });
    }
  </script>
</head>
<body></body>
</html>
